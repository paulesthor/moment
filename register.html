<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Moments d'Évasion</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=block"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="login-container"
        style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-bg-secondary); padding: 20px;">
        <div class="glass-card" style="width: 100%; max-width: 400px; padding: 2.5rem; background: white;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html">
                    <img src="Gemini_Generated_Image_36tfxk36tfxk36tf-removebg-preview.png" alt="Logo"
                        style="height: 60px; margin-bottom: 1rem;">
                </a>
                <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Créer un compte</h1>
                <p style="color: var(--color-text-secondary);">Rejoignez-nous pour gérer vos rendez-vous</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="fullName">Nom complet</label>
                    <input type="text" id="fullName" class="form-input" required placeholder="Votre nom">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" required placeholder="votre@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Mot de passe</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirmer le mot de passe</label>
                    <input type="password" id="confirmPassword" class="form-input" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center;">S'inscrire</button>

                <div id="message" style="margin-top: 1rem; text-align: center; font-size: 0.9rem;"></div>
            </form>

            <!-- Divider -->
            <div style="margin: 1.5rem 0; display: flex; align-items: center; gap: 1rem; color: #999;">
                <hr style="flex: 1; border: none; border-top: 1px solid #ddd;">
                <span style="font-size: 0.85rem;">OU</span>
                <hr style="flex: 1; border: none; border-top: 1px solid #ddd;">
            </div>

            <!-- Google Register Button -->
            <button id="google-register-btn" class="btn"
                style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: white; color: #444; border: 1px solid #ddd; font-weight: 500;">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                    <g fill="none" fill-rule="evenodd">
                        <path d="M17.6 9.2l-.1-1.8H9v3.4h4.8C13.6 12 13 13 12 13.6v2.2h3a8.8 8.8 0 0 0 2.6-6.6z"
                            fill="#4285F4" />
                        <path d="M9 18c2.4 0 4.5-.8 6-2.2l-3-2.2a5.4 5.4 0 0 1-8-2.9H1V13a9 9 0 0 0 8 5z"
                            fill="#34A853" />
                        <path d="M4 10.7a5.4 5.4 0 0 1 0-3.4V5H1a9 9 0 0 0 0 8l3-2.3z" fill="FBBC05" />
                        <path d="M9 3.6c1.3 0 2.5.4 3.4 1.3L15 2.3A9 9 0 0 0 1 5l3 2.4a5.4 5.4 0 0 1 5-3.7z"
                            fill="#EA4335" />
                    </g>
                </svg>
                S'inscrire avec Google
            </button>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--color-text-secondary);">
                Déjà un compte ? <a href="login.html" style="font-weight: 600;">Se connecter</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase } from './js/config.js';

        const registerForm = document.getElementById('registerForm');
        const messageEl = document.getElementById('message');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageEl.textContent = 'Création du compte...';
            messageEl.style.color = 'var(--color-text-secondary)';

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                messageEl.textContent = 'Les mots de passe ne correspondent pas.';
                messageEl.style.color = '#e74c3c';
                return;
            }

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: fullName
                        }
                    }
                });

                if (error) throw error;

                messageEl.textContent = 'Compte créé avec succès ! Redirection...';
                messageEl.style.color = '#27ae60';

                setTimeout(() => {
                    window.location.href = 'index.html'; // Or dashboard.html logic checks auth
                }, 1500);

            } catch (error) {
                console.error('Error:', error);
                messageEl.textContent = error.message;
                messageEl.style.color = '#e74c3c';
            }
        });

        // Google OAuth Register
        document.getElementById('google-register-btn').addEventListener('click', async () => {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/index.html',
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'consent'
                        }
                    }
                });

                if (error) throw error;
            } catch (error) {
                console.error('Google register error:', error);
                messageEl.textContent = 'Erreur lors de l\'inscription Google: ' + error.message;
                messageEl.style.color = '#e74c3c';
            }
        });
    </script>
</body>

</html>
