<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Moments d'Évasion</title>
    <!-- Same fonts and styles as main site -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background-color: var(--color-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            width: 80px;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-primary-dark);
        }

        .form-input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
        }

        .login-btn {
            width: 100%;
            margin-top: 1rem;
        }

        #error-msg {
            color: #e74c3c;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <a href="index.html">
            <img src="Gemini_Generated_Image_36tfxk36tfxk36tf-removebg-preview.png" alt="Logo" class="login-logo">
        </a>
        <h2 style="font-family: 'Cormorant Garamond', serif; color: var(--color-primary-dark); margin-bottom: 1.5rem;">
            Connexion</h2>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" required placeholder="votre@email.com">
            </div>

            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" id="password" class="form-input" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary login-btn">Se Connecter</button>
            <div id="error-msg"></div>
        </form>

        <!-- Divider -->
        <div style="margin: 1.5rem 0; display: flex; align-items: center; gap: 1rem; color: #999;">
            <hr style="flex: 1; border: none; border-top: 1px solid #ddd;">
            <span style="font-size: 0.85rem;">OU</span>
            <hr style="flex: 1; border: none; border-top: 1px solid #ddd;">
        </div>

        <!-- Google Login Button -->
        <button id="google-login-btn" class="btn"
            style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: white; color: #444; border: 1px solid #ddd; font-weight: 500;">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                <g fill="none" fill-rule="evenodd">
                    <path d="M17.6 9.2l-.1-1.8H9v3.4h4.8C13.6 12 13 13 12 13.6v2.2h3a8.8 8.8 0 0 0 2.6-6.6z"
                        fill="#4285F4" />
                    <path d="M9 18c2.4 0 4.5-.8 6-2.2l-3-2.2a5.4 5.4 0 0 1-8-2.9H1V13a9 9 0 0 0 8 5z" fill="#34A853" />
                    <path d="M4 10.7a5.4 5.4 0 0 1 0-3.4V5H1a9 9 0 0 0 0 8l3-2.3z" fill="#FBBC05" />
                    <path d="M9 3.6c1.3 0 2.5.4 3.4 1.3L15 2.3A9 9 0 0 0 1 5l3 2.4a5.4 5.4 0 0 1 5-3.7z"
                        fill="#EA4335" />
                </g>
            </svg>
            Continuer avec Google
        </button>

        <div style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--color-text-secondary);">
            Pas encore de compte ? <a href="register.html"
                style="font-weight: 600; color: var(--color-primary);">S'inscrire</a>
        </div>

        <p style="margin-top: 1rem; font-size: 0.9rem;">
            <a href="index.html" style="color: var(--color-primary);">← Retour au site</a>
        </p>
    </div>

    <!-- Login Logic -->
    <script type="module">
        import { supabase } from './js/config.js';

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // Redirect logic
                const urlParams = new URLSearchParams(window.location.search);
                const redirectTarget = urlParams.get('redirect');

                if (redirectTarget) {
                    window.location.href = decodeURIComponent(redirectTarget);
                } else {
                    // Check if admin
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('role')
                        .eq('id', data.user.id)
                        .single();

                    if (profile?.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = 'Erreur: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });

        // Google OAuth Login
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/index.html',
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'consent'
                        }
                    }
                });

                if (error) throw error;
            } catch (error) {
                console.error('Google login error:', error);
                errorMsg.textContent = 'Erreur lors de la connexion Google: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
